<!DOCTYPE html>
<html>
<head>
    <title>Debug Cache Keys</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .cache-key { margin: 5px 0; padding: 5px; border: 1px solid #ccc; }
        .found { background-color: #d4edda; }
        .not-found { background-color: #f8d7da; }
        .summary { background-color: #d1ecf1; padding: 10px; margin: 10px 0; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>🔍 Debug Cache Keys</h1>
    
    <div class="summary">
        <h3>🔍 Checking for Joshua Weissman Cache Keys</h3>
        <p>Looking for cache keys that should exist based on MongoDB data:</p>
        <ul>
            <li>Expected format: <code>yt_search_joshua_weissman_p1_none</code> through <code>p10_none</code></li>
            <li>Total expected: 10 cache keys</li>
        </ul>
    </div>
    
    <div id="results"></div>
    
    <script>
        function checkCacheKeys() {
            const resultsDiv = document.getElementById('results');
            const expectedKeys = [];
            
            // Generate expected cache keys
            for (let page = 1; page <= 10; page++) {
                expectedKeys.push(`yt_search_joshua_weissman_p${page}_none`);
            }
            
            let foundCount = 0;
            let totalKeys = 0;
            
            // Check each expected key
            expectedKeys.forEach(key => {
                const value = localStorage.getItem(key);
                const found = value !== null;
                if (found) foundCount++;
                
                const div = document.createElement('div');
                div.className = `cache-key ${found ? 'found' : 'not-found'}`;
                div.innerHTML = `
                    <strong>${key}</strong>: ${found ? '✅ FOUND' : '❌ NOT FOUND'}
                    ${found ? `<br>Data length: ${value ? value.length : 0} characters` : ''}
                `;
                resultsDiv.appendChild(div);
            });
            
            // Check all localStorage keys for any joshua-related entries
            const allKeys = Object.keys(localStorage);
            const joshuaKeys = allKeys.filter(key => key.toLowerCase().includes('joshua'));
            
            if (joshuaKeys.length > 0) {
                const div = document.createElement('div');
                div.className = 'cache-key found';
                div.innerHTML = `<h3>🔍 Other Joshua-related keys found in localStorage:</h3>`;
                joshuaKeys.forEach(key => {
                    const value = localStorage.getItem(key);
                    div.innerHTML += `<div>${key}: ${value ? value.length : 0} chars</div>`;
                });
                resultsDiv.appendChild(div);
            }
            
            // Summary
            const summaryDiv = document.createElement('div');
            summaryDiv.className = 'summary';
            summaryDiv.innerHTML = `
                <h3>📊 Summary</h3>
                <p><strong>Expected cache keys:</strong> ${expectedKeys.length}</p>
                <p><strong>Found cache keys:</strong> ${foundCount}</p>
                <p><strong>Missing cache keys:</strong> ${expectedKeys.length - foundCount}</p>
                <p><strong>Total localStorage keys:</strong> ${allKeys.length}</p>
                <p><strong>Joshua-related keys:</strong> ${joshuaKeys.length}</p>
            `;
            resultsDiv.appendChild(summaryDiv);
            
            // Check for any cache keys that might contain the data
            const searchKeys = allKeys.filter(key => key.includes('yt_search_'));
            if (searchKeys.length > 0) {
                const div = document.createElement('div');
                div.className = 'cache-key';
                div.innerHTML = `<h3>🔍 All yt_search_ keys in localStorage (${searchKeys.length}):</h3>`;
                searchKeys.slice(0, 20).forEach(key => {
                    const value = localStorage.getItem(key);
                    div.innerHTML += `<div>${key}: ${value ? value.length : 0} chars</div>`;
                });
                if (searchKeys.length > 20) {
                    div.innerHTML += `<div>... and ${searchKeys.length - 20} more</div>`;
                }
                resultsDiv.appendChild(div);
            }
        }
        
        // Run check when page loads
        window.addEventListener('load', checkCacheKeys);
    </script>
</body>
</html>

<!-- RecipeManager HTML Template -->
<div id="recipe-manager-container" class="recipe-manager-container">
  <div class="recipe-manager-content">
    <div class="recipe-manager-header">
      <h3>Recipe Manager</h3>
      <button class="recipe-manager-close" id="recipe-manager-close-btn" aria-label="Close">×</button>
    </div>
    <div class="recipe-manager-body">
      <div class="recipe-manager-section" id="recipe-content-section">
        <!-- Recipe content will be injected here -->
      </div>
      <div class="recipe-manager-images" id="recipe-images-section">
        <!-- Images will be injected here -->
      </div>
      <div class="recipe-manager-actions">
        <button id="recipe-manager-print-btn" class="recipe-manager-btn-primary">Print Recipe</button>
      </div>
    </div>
  </div>
</div>

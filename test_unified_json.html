<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Unified JSON Data</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 5px; }
        .success { background-color: #d4edda; border-color: #c3e6cb; }
        .error { background-color: #f8d7da; border-color: #f5c6cb; }
        .info { background-color: #d1ecf1; border-color: #bee5eb; }
        pre { background: #f8f9fa; padding: 10px; border-radius: 3px; overflow-x: auto; }
        .show-data { max-height: 300px; overflow-y: auto; }
    </style>
</head>
<body>
    <h1>🧪 Testing Unified JSON Data</h1>
    
    <div class="test-section info">
        <h3>📋 Test Overview</h3>
        <p>This page will test if the unified JSON file contains all the consolidated data and can be loaded successfully.</p>
    </div>

    <div class="test-section">
        <h3>1️⃣ Load Unified JSON</h3>
        <button onclick="testUnifiedJSON()">Test Unified JSON Loading</button>
        <div id="unified-test-result"></div>
    </div>

    <div class="test-section">
        <h3>2️⃣ Verify Data Structure</h3>
        <button onclick="verifyDataStructure()">Verify Data Structure</button>
        <div id="structure-test-result"></div>
    </div>

    <div class="test-section">
        <h3>3️⃣ Check The Big Bang Theory Data</h3>
        <button onclick="checkBigBangTheory()">Check TBBT Data</button>
        <div id="tbbt-test-result"></div>
    </div>

    <div class="test-section">
        <h3>4️⃣ Validate Metadata Integration</h3>
        <button onclick="validateMetadata()">Validate Metadata</button>
        <div id="metadata-test-result"></div>
    </div>

    <script>
        let unifiedData = null;

        async function testUnifiedJSON() {
            const resultDiv = document.getElementById('unified-test-result');
            resultDiv.innerHTML = '<p>🔄 Loading unified JSON...</p>';
            
            try {
                const response = await fetch('/components/MediaLibrary/data/tv-shows/tv-shows-unified.json');
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                unifiedData = await response.json();
                
                resultDiv.innerHTML = `
                    <div class="success">
                        <h4>✅ Success!</h4>
                        <p>Loaded unified JSON with <strong>${Object.keys(unifiedData).length}</strong> TV shows</p>
                        <p>File size: <strong>${(JSON.stringify(unifiedData).length / 1024 / 1024).toFixed(2)} MB</strong></p>
                        <details>
                            <summary>Show List (click to expand)</summary>
                            <ul>${Object.keys(unifiedData).map(show => `<li>${show}</li>`).join('')}</ul>
                        </details>
                    </div>
                `;
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="error">
                        <h4>❌ Error Loading Unified JSON</h4>
                        <p>${error.message}</p>
                    </div>
                `;
            }
        }

        function verifyDataStructure() {
            const resultDiv = document.getElementById('structure-test-result');
            
            if (!unifiedData) {
                resultDiv.innerHTML = '<div class="error"><p>❌ Please load the unified JSON first!</p></div>';
                return;
            }

            const issues = [];
            const successes = [];
            
            Object.keys(unifiedData).forEach(showName => {
                const show = unifiedData[showName];
                
                // Check basic structure
                if (!show.seasons) {
                    issues.push(`${showName}: Missing seasons object`);
                } else {
                    successes.push(`${showName}: Has seasons structure`);
                }
                
                // Check for metadata
                if (show.description) {
                    successes.push(`${showName}: Has description`);
                }
                if (show.genres) {
                    successes.push(`${showName}: Has genres`);
                }
                if (show.poster) {
                    successes.push(`${showName}: Has poster`);
                }
                if (show.cast) {
                    successes.push(`${showName}: Has cast info`);
                }
            });

            resultDiv.innerHTML = `
                <div class="info">
                    <h4>📊 Data Structure Analysis</h4>
                    <p><strong>Total shows analyzed:</strong> ${Object.keys(unifiedData).length}</p>
                    <p><strong>Issues found:</strong> ${issues.length}</p>
                    <p><strong>Successful metadata:</strong> ${successes.length}</p>
                    
                    ${issues.length > 0 ? `
                        <details>
                            <summary>❌ Issues Found (click to expand)</summary>
                            <ul>${issues.map(issue => `<li>${issue}</li>`).join('')}</ul>
                        </details>
                    ` : '<p>✅ No structural issues found!</p>'}
                    
                    <details>
                        <summary>✅ Successes (click to expand)</summary>
                        <ul>${successes.slice(0, 20).map(success => `<li>${success}</li>`).join('')}</ul>
                        ${successes.length > 20 ? `<p>... and ${successes.length - 20} more</p>` : ''}
                    </details>
                </div>
            `;
        }

        function checkBigBangTheory() {
            const resultDiv = document.getElementById('tbbt-test-result');
            
            if (!unifiedData) {
                resultDiv.innerHTML = '<div class="error"><p>❌ Please load the unified JSON first!</p></div>';
                return;
            }

            const tbbt = unifiedData['the.big.bang.theory.(2007)'];
            if (!tbbt) {
                resultDiv.innerHTML = '<div class="error"><p>❌ The Big Bang Theory not found in unified data!</p></div>';
                return;
            }

            const seasons = Object.keys(tbbt.seasons).filter(key => key !== '0' && key !== 'Specials');
            const totalEpisodes = Object.values(tbbt.seasons).reduce((total, season) => {
                return total + (season.episodes ? Object.keys(season.episodes).length : 0);
            }, 0);

            resultDiv.innerHTML = `
                <div class="success">
                    <h4>✅ The Big Bang Theory Data Verified</h4>
                    <p><strong>Seasons:</strong> ${seasons.length} (${seasons.join(', ')})</p>
                    <p><strong>Total Episodes:</strong> ${totalEpisodes}</p>
                    <p><strong>Description:</strong> ${tbbt.description || 'Not found'}</p>
                    <p><strong>Genres:</strong> ${tbbt.genres ? tbbt.genres.join(', ') : 'Not found'}</p>
                    <p><strong>Poster:</strong> ${tbbt.poster || 'Not found'}</p>
                    
                    <details>
                        <summary>Season 1 Episode Order (click to expand)</summary>
                        <div class="show-data">
                            <pre>${JSON.stringify(tbbt.seasons['1'].episodes, null, 2)}</pre>
                        </div>
                    </details>
                </div>
            `;
        }

        function validateMetadata() {
            const resultDiv = document.getElementById('metadata-test-result');
            
            if (!unifiedData) {
                resultDiv.innerHTML = '<div class="error"><p>❌ Please load the unified JSON first!</p></div>';
                return;
            }

            let showsWithDescription = 0;
            let showsWithGenres = 0;
            let showsWithPoster = 0;
            let showsWithCast = 0;
            let showsWithSeasonPosters = 0;

            Object.values(unifiedData).forEach(show => {
                if (show.description) showsWithDescription++;
                if (show.genres) showsWithGenres++;
                if (show.poster) showsWithPoster++;
                if (show.cast) showsWithCast++;
                
                if (show.seasons) {
                    Object.values(show.seasons).forEach(season => {
                        if (season.poster) showsWithSeasonPosters++;
                    });
                }
            });

            resultDiv.innerHTML = `
                <div class="info">
                    <h4>📊 Metadata Integration Results</h4>
                    <p><strong>Total shows:</strong> ${Object.keys(unifiedData).length}</p>
                    <p><strong>Shows with descriptions:</strong> ${showsWithDescription} (${((showsWithDescription / Object.keys(unifiedData).length) * 100).toFixed(1)}%)</p>
                    <p><strong>Shows with genres:</strong> ${showsWithGenres} (${((showsWithGenres / Object.keys(unifiedData).length) * 100).toFixed(1)}%)</p>
                    <p><strong>Shows with posters:</strong> ${showsWithPoster} (${((showsWithPoster / Object.keys(unifiedData).length) * 100).toFixed(1)}%)</p>
                    <p><strong>Shows with cast info:</strong> ${showsWithCast} (${((showsWithCast / Object.keys(unifiedData).length) * 100).toFixed(1)}%)</p>
                    <p><strong>Seasons with posters:</strong> ${showsWithSeasonPosters}</p>
                    
                    ${showsWithDescription > 0 && showsWithGenres > 0 && showsWithPoster > 0 ? 
                        '<p>✅ <strong>Metadata integration successful!</strong></p>' : 
                        '<p>⚠️ <strong>Some metadata may be missing</strong></p>'
                    }
                </div>
            `;
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Save Debug</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .debug-section { margin: 20px 0; padding: 15px; border: 1px solid #ccc; border-radius: 5px; }
        .debug-button { padding: 10px 15px; margin: 5px; background: #007bff; color: white; border: none; border-radius: 3px; cursor: pointer; }
        .debug-button:hover { background: #0056b3; }
        .debug-output { background: #f8f9fa; padding: 10px; border-radius: 3px; margin: 10px 0; white-space: pre-wrap; font-family: monospace; }
        .error { color: #dc3545; }
        .success { color: #28a745; }
        .warning { color: #ffc107; }
    </style>
</head>
<body>
    <h1>🔍 YouTube Search Save Debug Tool</h1>
    
    <div class="debug-section">
        <h3>1. Check Current State</h3>
        <button class="debug-button" onclick="checkCurrentState()">Check Current State</button>
        <div id="currentState" class="debug-output"></div>
    </div>
    
    <div class="debug-section">
        <h3>2. Test Save Functionality</h3>
        <input type="text" id="testQuery" placeholder="Enter test query (e.g., 'Zucchini')" style="width: 200px; padding: 5px;">
        <button class="debug-button" onclick="testSave()">Test Save</button>
        <div id="saveTest" class="debug-output"></div>
    </div>
    
    <div class="debug-section">
        <h3>3. Check Cache Keys</h3>
        <button class="debug-button" onclick="checkCacheKeys()">Check All Cache Keys</button>
        <div id="cacheKeys" class="debug-output"></div>
    </div>
    
    <div class="debug-section">
        <h3>4. Check Page Count Logic</h3>
        <input type="text" id="pageCountQuery" placeholder="Enter query to check page count" style="width: 200px; padding: 5px;">
        <button class="debug-button" onclick="checkPageCount()">Check Page Count</button>
        <div id="pageCount" class="debug-output"></div>
    </div>
    
    <div class="debug-section">
        <h3>5. Check Saved Queries</h3>
        <button class="debug-button" onclick="checkSavedQueries()">Check Saved Queries</button>
        <div id="savedQueries" class="debug-output"></div>
    </div>
    
    <div class="debug-section">
        <h3>6. Force Reload Saved Queries</h3>
        <button class="debug-button" onclick="forceReloadSaved()">Force Reload from Database</button>
        <div id="forceReload" class="debug-output"></div>
    </div>

    <script>
        function log(elementId, message, type = 'info') {
            const element = document.getElementById(elementId);
            const timestamp = new Date().toLocaleTimeString();
            const prefix = type === 'error' ? '❌' : type === 'success' ? '✅' : type === 'warning' ? '⚠️' : 'ℹ️';
            element.textContent += `[${timestamp}] ${prefix} ${message}\n`;
            element.scrollTop = element.scrollHeight;
        }

        function clearLog(elementId) {
            document.getElementById(elementId).textContent = '';
        }

        async function checkCurrentState() {
            clearLog('currentState');
            log('currentState', 'Checking current YouTube search manager state...');
            
            if (!window.youtubeSearchManager) {
                log('currentState', '❌ YouTube search manager not found!', 'error');
                return;
            }
            
            log('currentState', `✅ YouTube search manager found`);
            log('currentState', `📊 Saved queries count: ${window.youtubeSearchManager.savedQueries?.size || 0}`);
            log('currentState', `📊 Access history count: ${window.youtubeSearchManager.queryAccessHistory?.length || 0}`);
            log('currentState', `📊 Current query: ${window.youtubeSearchManager.currentQuery || 'None'}`);
            
            // Check if the manager has the required methods
            const requiredMethods = ['saveQuery', 'loadSavedQueries', 'isQuerySaved', 'getCachedPageCount'];
            requiredMethods.forEach(method => {
                if (typeof window.youtubeSearchManager[method] === 'function') {
                    log('currentState', `✅ Method ${method} exists`);
                } else {
                    log('currentState', `❌ Method ${method} missing!`, 'error');
                }
            });
        }

        async function testSave() {
            clearLog('saveTest');
            const query = document.getElementById('testQuery').value.trim();
            if (!query) {
                log('saveTest', '❌ Please enter a test query', 'error');
                return;
            }
            
            log('saveTest', `🧪 Testing save for query: "${query}"`);
            
            if (!window.youtubeSearchManager) {
                log('saveTest', '❌ YouTube search manager not found!', 'error');
                return;
            }
            
            try {
                log('saveTest', '📤 Attempting to save query...');
                await window.youtubeSearchManager.saveQuery(query, 'search');
                log('saveTest', '✅ Save completed successfully!', 'success');
                
                // Check if it's now marked as saved
                const isSaved = window.youtubeSearchManager.isQuerySaved(query);
                log('saveTest', `📊 Query saved status: ${isSaved ? 'YES' : 'NO'}`);
                
                // Reload saved queries
                log('saveTest', '🔄 Reloading saved queries...');
                await window.youtubeSearchManager.loadSavedQueries();
                log('saveTest', '✅ Reload completed');
                
            } catch (error) {
                log('saveTest', `❌ Save failed: ${error.message}`, 'error');
                console.error('Save error:', error);
            }
        }

        function checkCacheKeys() {
            clearLog('cacheKeys');
            log('cacheKeys', '🔍 Scanning localStorage for YouTube cache keys...');
            
            const youtubeKeys = [];
            const otherKeys = [];
            
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key && key.startsWith('yt_')) {
                    youtubeKeys.push(key);
                } else if (key) {
                    otherKeys.push(key);
                }
            }
            
            log('cacheKeys', `📊 Found ${youtubeKeys.length} YouTube cache keys:`);
            youtubeKeys.forEach(key => {
                try {
                    const data = JSON.parse(localStorage.getItem(key));
                    const hasVideos = data?.data?.videos?.length > 0 || data?.videos?.length > 0;
                    const videoCount = data?.data?.videos?.length || data?.videos?.length || 0;
                    log('cacheKeys', `  ${key} - Videos: ${videoCount} ${hasVideos ? '✅' : '❌'}`);
                } catch (e) {
                    log('cacheKeys', `  ${key} - Parse error: ${e.message}`, 'error');
                }
            });
            
            log('cacheKeys', `📊 Other keys: ${otherKeys.length}`);
            if (otherKeys.length > 0) {
                log('cacheKeys', `  Sample: ${otherKeys.slice(0, 5).join(', ')}`);
            }
        }

        async function checkPageCount() {
            clearLog('pageCount');
            const query = document.getElementById('pageCountQuery').value.trim();
            if (!query) {
                log('pageCount', '❌ Please enter a query to check', 'error');
                return;
            }
            
            log('pageCount', `🔍 Checking page count for query: "${query}"`);
            
            if (!window.youtubeSearchManager) {
                log('pageCount', '❌ YouTube search manager not found!', 'error');
                return;
            }
            
            try {
                const pageCount = window.youtubeSearchManager.getCachedPageCount(query);
                log('pageCount', `📊 Page count result: ${pageCount}`);
                
                // Also check manually
                log('pageCount', '🔍 Manual cache key check:');
                let foundPages = 0;
                for (let i = 1; i <= 20; i++) {
                    const key = `yt_search_${query.replace(/\s+/g, '_')}_p${i}_none`;
                    if (localStorage.getItem(key)) {
                        foundPages++;
                        log('pageCount', `  ✅ Found page ${i}: ${key}`);
                    }
                }
                log('pageCount', `📊 Manual count: ${foundPages} pages`);
                
            } catch (error) {
                log('pageCount', `❌ Error checking page count: ${error.message}`, 'error');
            }
        }

        function checkSavedQueries() {
            clearLog('savedQueries');
            log('savedQueries', '📚 Checking saved queries from manager...');
            
            if (!window.youtubeSearchManager) {
                log('savedQueries', '❌ YouTube search manager not found!', 'error');
                return;
            }
            
            const savedQueries = window.youtubeSearchManager.savedQueries;
            if (!savedQueries || savedQueries.size === 0) {
                log('savedQueries', '⚠️ No saved queries found in manager', 'warning');
                return;
            }
            
            log('savedQueries', `📊 Found ${savedQueries.size} saved queries:`);
            savedQueries.forEach((value, key) => {
                log('savedQueries', `  "${key}" -> ${JSON.stringify(value, null, 2)}`);
            });
        }

        async function forceReloadSaved() {
            clearLog('forceReload');
            log('forceReload', '🔄 Force reloading saved queries from database...');
            
            if (!window.youtubeSearchManager) {
                log('forceReload', '❌ YouTube search manager not found!', 'error');
                return;
            }
            
            try {
                await window.youtubeSearchManager.loadSavedQueries();
                log('forceReload', '✅ Reload completed');
                
                const count = window.youtubeSearchManager.savedQueries?.size || 0;
                log('forceReload', `📊 Reloaded ${count} saved queries`);
                
            } catch (error) {
                log('forceReload', `❌ Reload failed: ${error.message}`, 'error');
            }
        }

        // Auto-check on page load
        window.addEventListener('load', () => {
            setTimeout(() => {
                if (window.youtubeSearchManager) {
                    log('currentState', '🚀 Page loaded, YouTube search manager ready');
                } else {
                    log('currentState', '⚠️ YouTube search manager not ready yet, waiting...', 'warning');
                    // Wait a bit more
                    setTimeout(() => {
                        if (window.youtubeSearchManager) {
                            log('currentState', '✅ YouTube search manager now ready');
                        } else {
                            log('currentState', '❌ YouTube search manager still not found', 'error');
                        }
                    }, 2000);
                }
            }, 1000);
        });
    </script>
</body>
</html>

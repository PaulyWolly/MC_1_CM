<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Collections Modal</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #1a1a1a;
            color: #fff;
            margin: 20px;
        }
        
        .test-button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            margin: 10px;
        }
        
        .test-button:hover {
            background: #45a049;
        }
        
        /* Collections Modal Styles */
        .collection-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .collection-modal-add-create-content {
            background: #2a2a2a;
            border-radius: 12px;
            padding: 0;
            max-width: 800px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        }
        
        .collection-modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 24px;
            border-bottom: 1px solid #444;
            background: linear-gradient(135deg, #2a2a2a 0%, #1a1a1a 100%);
            border-radius: 12px 12px 0 0;
        }
        
        .collection-modal-header h3 {
            margin: 0;
            color: #fff;
            font-size: 18px;
            font-weight: 600;
        }
        
        .collection-modal-btn-close {
            background: none;
            border: none;
            color: #888;
            font-size: 24px;
            cursor: pointer;
            padding: 0;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: all 0.2s;
        }
        
        .collection-modal-btn-close:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }
        
        .collection-modal-body {
            padding: 24px;
        }
        
        .collections-modal-category {
            margin-bottom: 24px;
        }
        
        .collections-modal-category h4 {
            color: #4CAF50;
            margin: 15px 0 5px 0;
            text-transform: capitalize;
            font-size: 16px;
            font-weight: 600;
        }
        
        .collections-modal-checkbox-item {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
            cursor: pointer;
            gap: 8px;
        }
        
        .collections-modal-checkbox-item input[type="checkbox"] {
            margin: 0;
            cursor: pointer;
        }
        
        .collections-modal-checkbox-text {
            color: #fff;
            font-size: 14px;
        }
        
        .collection-add-new-item {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-top: 8px;
            padding: 8px;
            background: rgba(76, 175, 80, 0.1);
            border-radius: 4px;
            border: 1px solid rgba(76, 175, 80, 0.3);
        }
        
        .collection-new-item-input {
            flex: 1;
            background: #333;
            color: #fff;
            border: 1px solid #555;
            border-radius: 4px;
            padding: 6px 10px;
            font-size: 13px;
        }
        
        .collection-new-item-input:focus {
            outline: none;
            border-color: #4CAF50;
            box-shadow: 0 0 0 2px rgba(76, 175, 80, 0.2);
        }
        
        .collection-add-item-btn {
            background: #4CAF50;
            color: #fff;
            border: none;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.2s;
        }
        
        .collection-add-item-btn:hover {
            background: #45a049;
        }
        
        .collection-add-item-btn:active {
            transform: scale(0.95);
        }
        
        .collection-modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            padding: 20px 24px;
            border-top: 1px solid #444;
            background: #1a1a1a;
            border-radius: 0 0 12px 12px;
        }
        
        .collection-modal-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }
        
        .collection-modal-btn-cancel {
            background: #555;
            color: #fff;
        }
        
        .collection-modal-btn-cancel:hover {
            background: #666;
        }
        
        .collection-modal-btn-primary {
            background: #4CAF50;
            color: #fff;
        }
        
        .collection-modal-btn-primary:hover {
            background: #45a049;
        }
    </style>
</head>
<body>
    <h1>Collections Modal Test</h1>
    <p>Click the button below to test the collections modal with "Add New Item" functionality:</p>
    
    <button class="test-button" onclick="showTestModal()">Open Collections Modal</button>
    
    <div id="modalContainer"></div>
    
    <script>
        function showTestModal() {
            const modalHTML = `
                <div id="addToCollectionModal" class="collection-modal-overlay">
                    <div class="collection-modal-add-create-content">
                        <div class="collection-modal-header">
                            <h3>Manage Collections: <span style="color: #4CAF50;">Test Movie</span></h3>
                            <button class="collection-modal-btn collection-modal-btn-close" id="closeCollectionModal">&times;</button>
                        </div>
                        <div class="collection-modal-body">
                            <div class="collections-modal-content">
                                <div class="collections-modal-category">
                                    <h4 style="color: #4CAF50; margin: 15px 0 5px 0; text-transform: capitalize;">Genres</h4>
                                    <label class="collections-modal-checkbox-item">
                                        <input type="checkbox" value="Action">
                                        <span class="collections-modal-checkbox-text">Action</span>
                                    </label>
                                    <label class="collections-modal-checkbox-item">
                                        <input type="checkbox" value="Comedy">
                                        <span class="collections-modal-checkbox-text">Comedy</span>
                                    </label>
                                    <div class="collection-add-new-item">
                                        <input type="text" class="collection-new-item-input" placeholder="Add new genre..." data-category="Genres">
                                        <button class="collection-add-item-btn" data-category="Genres" title="Add new genre">+</button>
                                    </div>
                                </div>
                                
                                <div class="collections-modal-category">
                                    <h4 style="color: #4CAF50; margin: 15px 0 5px 0; text-transform: capitalize;">Actors</h4>
                                    <label class="collections-modal-checkbox-item">
                                        <input type="checkbox" value="Tom Hanks">
                                        <span class="collections-modal-checkbox-text">Tom Hanks</span>
                                    </label>
                                    <label class="collections-modal-checkbox-item">
                                        <input type="checkbox" value="Julia Roberts">
                                        <span class="collections-modal-checkbox-text">Julia Roberts</span>
                                    </label>
                                    <div class="collection-add-new-item">
                                        <input type="text" class="collection-new-item-input" placeholder="Add new actor..." data-category="Actors">
                                        <button class="collection-add-item-btn" data-category="Actors" title="Add new actor">+</button>
                                    </div>
                                </div>
                                
                                <div class="collections-modal-category">
                                    <h4 style="color: #4CAF50; margin: 15px 0 5px 0; text-transform: capitalize;">Years</h4>
                                    <label class="collections-modal-checkbox-item">
                                        <input type="checkbox" value="2020">
                                        <span class="collections-modal-checkbox-text">2020</span>
                                    </label>
                                    <label class="collections-modal-checkbox-item">
                                        <input type="checkbox" value="2021">
                                        <span class="collections-modal-checkbox-text">2021</span>
                                    </label>
                                    <div class="collection-add-new-item">
                                        <input type="text" class="collection-new-item-input" placeholder="Add new year..." data-category="Years">
                                        <button class="collection-add-item-btn" data-category="Years" title="Add new year">+</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="collection-modal-footer">
                            <button id="cancelCollectionBtn" class="collection-modal-btn collection-modal-btn-cancel">Cancel</button>
                            <button id="addCollectionBtn" class="collection-modal-btn collection-modal-btn-primary">Update Collections</button>
                        </div>
                    </div>
                </div>
            `;
            
            document.getElementById('modalContainer').innerHTML = modalHTML;
            
            const modal = document.getElementById("addToCollectionModal");
            const addBtn = document.getElementById("addCollectionBtn");
            const cancelBtn = document.getElementById("cancelCollectionBtn");
            const closeBtn = document.getElementById("closeCollectionModal");
            
            // Close modal function
            const closeModal = () => {
                modal.remove();
            };
            
            // Event listeners
            closeBtn.addEventListener("click", closeModal);
            cancelBtn.addEventListener("click", closeModal);
            modal.addEventListener("click", (e) => {
                if (e.target === modal) closeModal();
            });
            
            // Add synchronized checkbox behavior for duplicate labels
            const checkboxes = modal.querySelectorAll('input[type="checkbox"]');
            checkboxes.forEach(checkbox => {
                checkbox.addEventListener('change', (e) => {
                    const label = e.target.value;
                    const isChecked = e.target.checked;
                    
                    // Find all checkboxes with the same label and sync them
                    const sameLabelCheckboxes = modal.querySelectorAll(`input[type="checkbox"][value="${label}"]`);
                    sameLabelCheckboxes.forEach(sameCheckbox => {
                        if (sameCheckbox !== e.target) {
                            sameCheckbox.checked = isChecked;
                        }
                    });
                });
            });
            
            // Add "Add New Item" functionality for each category
            const addNewInputs = modal.querySelectorAll('.collection-new-item-input');
            const addNewButtons = modal.querySelectorAll('.collection-add-item-btn');
            
            addNewInputs.forEach((input, index) => {
                const addButton = addNewButtons[index];
                const category = input.dataset.category;
                
                // Handle Enter key press
                input.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') {
                        addNewItemToCategory(input, addButton, category);
                    }
                });
                
                // Handle Add button click
                addButton.addEventListener('click', () => {
                    addNewItemToCategory(input, addButton, category);
                });
            });
            
            // Function to add new item to a category
            const addNewItemToCategory = (input, button, category) => {
                const newItemName = input.value.trim();
                if (!newItemName) return;
                
                // Find the category container
                const categoryContainer = input.closest('.collections-modal-category');
                if (!categoryContainer) return;
                
                // Create new checkbox item
                const newCheckboxHTML = `
                    <label class="collections-modal-checkbox-item">
                        <input type="checkbox" value="${newItemName}">
                        <span class="collections-modal-checkbox-text">${newItemName}</span>
                    </label>
                `;
                
                // Insert before the "Add New" section
                const addNewSection = categoryContainer.querySelector('.collection-add-new-item');
                addNewSection.insertAdjacentHTML('beforebegin', newCheckboxHTML);
                
                // Clear the input
                input.value = '';
                
                // Add synchronized checkbox behavior to the new checkbox
                const newCheckbox = categoryContainer.querySelector(`input[value="${newItemName}"]`);
                newCheckbox.addEventListener('change', (e) => {
                    const label = e.target.value;
                    const isChecked = e.target.checked;
                    
                    // Find all checkboxes with the same label and sync them
                    const sameLabelCheckboxes = modal.querySelectorAll(`input[type="checkbox"][value="${label}"]`);
                    sameLabelCheckboxes.forEach(sameCheckbox => {
                        if (sameCheckbox !== e.target) {
                            sameCheckbox.checked = isChecked;
                        }
                    });
                });
                
                console.log(`[DEBUG - COLLECTIONS] Added new ${category.toLowerCase().slice(0, -1)}: ${newItemName}`);
            };
            
            // Test synchronized checkboxes
            addBtn.addEventListener('click', () => {
                const checkedItems = Array.from(modal.querySelectorAll('input[type="checkbox"]:checked'))
                    .map(cb => cb.value);
                console.log('Checked items:', checkedItems);
                alert(`Collections updated! Checked items: ${checkedItems.join(', ')}`);
            });
        }
    </script>
</body>
</html>


<!DOCTYPE html>
<html>
<head>
    <title>Fix LocalStorage Watch Later Quality Tags</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .log { background: #f0f0f0; padding: 10px; margin: 10px 0; border-radius: 5px; }
        .success { color: green; }
        .error { color: red; }
        .info { color: blue; }
    </style>
</head>
<body>
    <h1>Fix LocalStorage Watch Later Quality Tags</h1>
    <p>This page will fix the localStorage Watch Later data by removing [quality] tags from file paths.</p>
    
    <button onclick="fixLocalStorage()">Fix LocalStorage Data</button>
    <button onclick="checkLocalStorage()">Check Current Data</button>
    
    <div id="output"></div>
    
    <script>
        const localStorageKey = "mediaLibraryResumeList";
        
        function log(message, type = 'info') {
            const output = document.getElementById('output');
            const div = document.createElement('div');
            div.className = 'log ' + type;
            div.textContent = message;
            output.appendChild(div);
        }
        
        function checkLocalStorage() {
            log('=== CHECKING CURRENT LOCALSTORAGE DATA ===', 'info');
            
            try {
                const data = localStorage.getItem(localStorageKey);
                if (!data) {
                    log('No data found in localStorage', 'error');
                    return;
                }
                
                const watchLaterData = JSON.parse(data);
                log(`Found ${watchLaterData.length} items in localStorage`, 'info');
                
                // Check for quality tags
                let itemsWithQualityTags = 0;
                watchLaterData.forEach((item, index) => {
                    if (item.path && item.path.includes('[')) {
                        itemsWithQualityTags++;
                        log(`Item ${index + 1}: "${item.path}" (has quality tags)`, 'error');
                    }
                });
                
                if (itemsWithQualityTags === 0) {
                    log('✅ No quality tags found - localStorage data is already clean', 'success');
                } else {
                    log(`⚠️ Found ${itemsWithQualityTags} items with quality tags that need fixing`, 'error');
                }
                
            } catch (error) {
                log(`Error checking localStorage: ${error.message}`, 'error');
            }
        }
        
        function fixLocalStorage() {
            log('=== FIXING LOCALSTORAGE DATA ===', 'info');
            
            try {
                const data = localStorage.getItem(localStorageKey);
                if (!data) {
                    log('No data found in localStorage', 'error');
                    return;
                }
                
                const watchLaterData = JSON.parse(data);
                log(`Processing ${watchLaterData.length} items...`, 'info');
                
                let changesMade = 0;
                
                // Process each item
                watchLaterData.forEach((item, index) => {
                    let itemChanged = false;
                    
                    // Fix path - remove [quality] tags
                    if (item.path && item.path.includes('[')) {
                        const oldPath = item.path;
                        item.path = item.path.replace(/\s*\[[^\]]*\]\s*/g, ' ').trim();
                        log(`Fixed path: "${oldPath}" → "${item.path}"`, 'success');
                        itemChanged = true;
                    }
                    
                    // Fix absPath - remove [quality] tags
                    if (item.absPath && item.absPath.includes('[')) {
                        const oldAbsPath = item.absPath;
                        item.absPath = item.absPath.replace(/\s*\[[^\]]*\]\s*/g, ' ').trim();
                        log(`Fixed absPath: "${oldAbsPath}" → "${item.absPath}"`, 'success');
                        itemChanged = true;
                    }
                    
                    // Fix fileName - remove [quality] tags
                    if (item.fileName && item.fileName.includes('[')) {
                        const oldFileName = item.fileName;
                        item.fileName = item.fileName.replace(/\s*\[[^\]]*\]\s*/g, ' ').trim();
                        log(`Fixed fileName: "${oldFileName}" → "${item.fileName}"`, 'success');
                        itemChanged = true;
                    }
                    
                    if (itemChanged) {
                        changesMade++;
                    }
                });
                
                if (changesMade > 0) {
                    // Save the updated data back to localStorage
                    localStorage.setItem(localStorageKey, JSON.stringify(watchLaterData));
                    log(`✅ Successfully fixed ${changesMade} items in localStorage`, 'success');
                    log('Data has been saved to localStorage. You can now close this page.', 'success');
                } else {
                    log('✅ No quality tags found - localStorage data is already clean', 'success');
                }
                
            } catch (error) {
                log(`Error fixing localStorage: ${error.message}`, 'error');
            }
        }
        
        // Auto-check on page load
        window.onload = function() {
            log('Page loaded. Click "Check Current Data" to see what needs fixing.', 'info');
        };
    </script>
</body>
</html>
